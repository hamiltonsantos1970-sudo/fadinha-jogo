<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>✨ Jogo da Fadinha de Luz</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1a0533 0%, #2d0a5e 40%, #0d1f6e 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }

  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .star {
    position: absolute; border-radius: 50%; background: #fff;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.2; transform: scale(1); } to { opacity: 1; transform: scale(1.4); } }

  .container {
    position: relative; z-index: 1;
    max-width: 680px; margin: 0 auto;
    padding: 16px 12px 100px;
    display: flex; flex-direction: column; gap: 0;
  }

  .header { text-align: center; padding: 20px 0 12px; }
  .header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 26px; font-weight: 800;
    background: linear-gradient(90deg, #ffd700, #ff9fff, #7df9ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px rgba(255,215,0,0.4));
  }
  .header .subtitle { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }

  .phase-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.4);
    border-radius: 20px; padding: 4px 14px;
    font-size: 13px; font-weight: 600; color: #ffd700;
    margin: 8px auto 0; width: fit-content;
  }

  .chat-area {
    display: flex; flex-direction: column; gap: 10px;
    padding: 8px 0; min-height: 360px;
  }

  .msg {
    display: flex; gap: 10px; align-items: flex-start;
    animation: msgIn 0.4s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(12px) scale(0.95); } to { opacity: 1; transform: none; } }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 18px; border: 2px solid rgba(255,255,255,0.2);
  }
  .avatar.fairy { background: linear-gradient(135deg, #ff9fff, #c084fc); }
  .avatar.user-av { background: linear-gradient(135deg, #60a5fa, #3b82f6); font-size: 14px; font-weight: 700; }

  .bubble {
    max-width: 80%; padding: 10px 14px;
    border-radius: 18px; font-size: 14px; line-height: 1.55;
  }
  .bubble.fairy-bubble {
    background: rgba(192,132,252,0.18); border: 1px solid rgba(192,132,252,0.35);
    border-top-left-radius: 4px; color: #f0e6ff;
  }
  .bubble.user-bubble {
    background: rgba(96,165,250,0.2); border: 1px solid rgba(96,165,250,0.3);
    border-top-right-radius: 4px; color: #e0f0ff;
  }

  .coins-bar {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3);
    border-radius: 14px; padding: 8px 14px; margin: 4px 0;
  }
  .coins-bar span { font-size: 13px; color: #ffd700; font-weight: 600; }

  .image-preview {
    border-radius: 14px; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15); margin: 6px 0;
    max-width: 100%; position: relative;
  }
  .image-preview img { width: 100%; display: block; border-radius: 12px; }

  .candy-rain {
    position: absolute; inset: 0; pointer-events: none;
    border-radius: 12px; overflow: hidden;
  }
  .candy {
    position: absolute; font-size: 22px;
    animation: fall 1.8s cubic-bezier(.2,.8,.6,1) both;
  }
  @keyframes fall {
    from { transform: translateY(-40px) rotate(0deg); opacity: 1; }
    to { transform: translateY(120%) rotate(360deg); opacity: 0.8; }
  }

  .errors-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .error-item {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.07); border-radius: 10px;
    padding: 7px 12px; font-size: 13px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.25s;
  }
  .error-item:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,215,0,0.4); }
  .error-item.found { background: rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.5); color: #ffd700; }
  .error-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255,255,255,0.1); display: flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0;
  }

  .riddle-box {
    background: linear-gradient(135deg, rgba(96,165,250,0.12), rgba(167,139,250,0.12));
    border: 1px solid rgba(167,139,250,0.35); border-radius: 16px;
    padding: 14px 16px; margin-top: 8px; font-size: 14px;
    font-style: italic; color: #c4b5fd; line-height: 1.6;
  }

  .input-row {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    background: linear-gradient(to top, #1a0533 60%, transparent);
    padding: 12px 12px 16px;
  }
  .input-inner {
    max-width: 680px; margin: 0 auto;
    display: flex; gap: 8px; align-items: flex-end;
  }

  .text-input {
    flex: 1; background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 24px;
    padding: 10px 16px; color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 14px; outline: none; resize: none;
    max-height: 100px; line-height: 1.4;
  }
  .text-input::placeholder { color: rgba(255,255,255,0.35); }
  .text-input:focus { border-color: rgba(192,132,252,0.6); background: rgba(255,255,255,0.14); }

  .btn-send, .btn-photo {
    width: 42px; height: 42px; border-radius: 50%;
    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; font-size: 18px;
    transition: transform 0.15s, opacity 0.15s; flex-shrink: 0;
  }
  .btn-send { background: linear-gradient(135deg, #c084fc, #818cf8); }
  .btn-photo { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); }
  .btn-send:hover, .btn-photo:hover { transform: scale(1.1); opacity: 0.9; }
  .btn-send:active, .btn-photo:active { transform: scale(0.95); }

  #file-in { display: none; }

  .loading-dots { display: inline-flex; gap: 4px; align-items: center; }
  .loading-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: rgba(192,132,252,0.6);
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  .api-error { color: #fca5a5; font-size: 13px; }

  .found-all-btn {
    display: inline-block;
    background: linear-gradient(135deg,#fbbf24,#f59e0b);
    color: #1a0533; font-weight: 700; border: none; border-radius: 20px;
    padding: 8px 20px; font-size: 13px; cursor: pointer; margin-top: 10px;
    font-family: 'Nunito', sans-serif; transition: transform 0.15s;
  }
  .found-all-btn:hover { transform: scale(1.05); }

  .plim {
    text-align: center; font-size: 28px; font-family: 'Baloo 2', cursive;
    font-weight: 800; color: #ffd700;
    animation: plimAnim 0.6s cubic-bezier(.34,1.56,.64,1) both;
    filter: drop-shadow(0 0 12px rgba(255,215,0,0.6));
  }
  @keyframes plimAnim { from{transform:scale(0) rotate(-15deg)} to{transform:scale(1) rotate(0)} }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="header">
    <h1>✨ Jogo da Fadinha de Luz ✨</h1>
    <div class="subtitle">para a Chefe &amp; o Engenheiro</div>
    <div class="phase-badge" id="phase-badge">🌟 Fase 1 — A Busca</div>
  </div>

  <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 2px;">
    <div class="coins-bar" id="coins-bar" style="margin:0;">
      <span>🪙</span>
      <span id="coins-count">0 moedas</span>
      <span style="color:rgba(255,255,255,0.4);font-size:12px;margin-left:4px;">
        | 🍫 <span id="choc">0</span>
        ☁️ <span id="marsh">0</span>
        🍬 <span id="gum">0</span>
      </span>
    </div>
  </div>

  <div class="chat-area" id="chat"></div>
</div>

<div class="input-row">
  <div class="input-inner">
    <button class="btn-photo" id="btn-photo" title="Enviar foto">📷</button>
    <input type="file" id="file-in" accept="image/*" capture="environment">
    <textarea class="text-input" id="text-in" placeholder="Fale com a Fadinha... ✨" rows="1"></textarea>
    <button class="btn-send" id="btn-send" title="Enviar">✈️</button>
  </div>
</div>

<script>
  // ══════════════════════════════════════════
  // ⚠️  COLE SUA CHAVE DA API DO CLAUDE AQUI
  // ══════════════════════════════════════════
  const API_KEY = "sk_bvcwg5fn_c8mesabnce04iet9x73pmjor9r46l9dr";
  // ══════════════════════════════════════════

  const API = "https://api.anthropic.com/v1/messages";
  const MODEL = "claude-sonnet-4-20250514";

  let phase = 1;
  let coins = 0, choc = 0, marsh = 0, gumCount = 0;
  let errorsData = null;
  let foundCount = 0;
  let riddleAnswer = "";
  let currentPhotoBase64 = null;
  let chatHistory = [];

  function updateCoins() {
    document.getElementById("coins-count").textContent = coins + " moedas";
    document.getElementById("choc").textContent = choc;
    document.getElementById("marsh").textContent = marsh;
    document.getElementById("gum").textContent = gumCount;
  }

  function setPhaseBadge(text) {
    document.getElementById("phase-badge").textContent = text;
  }

  function makeStars() {
    const c = document.getElementById("stars");
    for (let i = 0; i < 60; i++) {
      const s = document.createElement("div");
      s.className = "star";
      const sz = Math.random() * 2.5 + 1;
      s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s`;
      c.appendChild(s);
    }
  }
  makeStars();

  function addMsg(who, html) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    const isUser = who === "user";
    div.className = "msg " + (isUser ? "user" : "");
    div.innerHTML = `
      <div class="avatar ${isUser ? "user-av" : "fairy"}">${isUser ? "👶" : "🧚"}</div>
      <div class="bubble ${isUser ? "user-bubble" : "fairy-bubble"}">${html}</div>
    `;
    chat.appendChild(div);
    div.scrollIntoView({ behavior: "smooth", block: "end" });
    return div;
  }

  function addLoading() {
    return addMsg("fairy", '<div class="loading-dots"><span></span><span></span><span></span></div>');
  }

  async function callClaude(systemPrompt, userMessage, imageBase64 = null) {
    const msgs = [...chatHistory];
    let content;
    if (imageBase64) {
      content = [
        { type: "image", source: { type: "base64", media_type: "image/jpeg", data: imageBase64 } },
        { type: "text", text: typeof userMessage === "string" ? userMessage : "Processe esta imagem." }
      ];
    } else {
      content = userMessage;
    }
    msgs.push({ role: "user", content });

    const resp = await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({ model: MODEL, max_tokens: 1000, system: systemPrompt, messages: msgs })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content.map(b => b.type === "text" ? b.text : "").join("");
    chatHistory.push({ role: "user", content });
    chatHistory.push({ role: "assistant", content: text });
    if (chatHistory.length > 20) chatHistory = chatHistory.slice(-16);
    return text;
  }

  const SYSTEM_FAIRY = `Você é a Fadinha de Luz ✨, ajudante mágica de um jogo educativo para uma criança chamada "a Chefe" e seu pai "o Engenheiro". Use linguagem simples, alegre e mágica com emojis. Seja sempre encorajadora. Responda SEMPRE em português brasileiro.`;

  const SYSTEM_ERRORS = `Você é a Fadinha de Luz ✨ gerenciando um jogo de encontrar erros. Responda SEMPRE em JSON puro, sem blocos de código markdown, sem texto antes ou depois.`;

  async function phase1_processPhoto(b64) {
    const loader = addLoading();
    try {
      const raw = await callClaude(
        SYSTEM_ERRORS,
        `Analise esta foto de um cômodo e crie 5 "erros absurdos" imaginários completamente fora de lugar e engraçados que poderiam estar escondidos. Retorne SOMENTE este JSON (sem texto extra, sem blocos de código):
{"errors":[{"id":1,"emoji":"🐧","name":"Um pinguim","desc":"sentado no sofá usando óculos de sol"},{"id":2,"emoji":"🍕","name":"Uma pizza gigante","desc":"flutuando no teto"},{"id":3,"emoji":"🚜","name":"Um trator","desc":"estacionado atrás da porta"},{"id":4,"emoji":"🦒","name":"Uma girafa","desc":"espiando pela janela"},{"id":5,"emoji":"🎪","name":"Uma tenda de circo","desc":"no cantinho"}]}
Use sua criatividade para criar 5 erros baseados no cômodo da foto.`,
        b64
      );
      loader.remove();

      let parsed;
      try {
        const clean = raw.replace(/```json|```/g, '').trim();
        parsed = JSON.parse(clean);
      } catch (e) {
        const m = raw.match(/\{[\s\S]*\}/);
        if (m) parsed = JSON.parse(m[0]);
        else throw new Error("JSON inválido na resposta");
      }
      errorsData = parsed.errors;
      foundCount = 0;

      const imgDiv = document.createElement("div");
      imgDiv.className = "msg";
      imgDiv.innerHTML = `
        <div class="avatar fairy">🧚</div>
        <div class="bubble fairy-bubble" style="width:100%;max-width:100%;padding:8px;">
          <div style="font-size:13px;margin-bottom:8px;color:#c4b5fd;">✨ Foto transformada em mapa mágico!</div>
          <div class="image-preview" id="room-preview">
            <img src="data:image/jpeg;base64,${b64}" alt="cômodo">
            <div style="position:absolute;inset:0;border-radius:12px;background:rgba(255,255,255,0.06);mix-blend-mode:luminosity;pointer-events:none;"></div>
            <div class="candy-rain" id="candy-zone"></div>
          </div>
          <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:6px;">5 erros absurdos estão escondidos aqui... 🔍</div>
        </div>`;
      document.getElementById("chat").appendChild(imgDiv);

      let errHtml = `<div style="font-size:14px;font-weight:700;margin-bottom:8px;color:#ffd700;">🔍 Clique nos erros que você encontrar:</div><div class="errors-list" id="errors-list">`;
      errorsData.forEach(e => {
        errHtml += `<div class="error-item" id="err-${e.id}" onclick="markError(${e.id})">
          <div class="error-num">${e.id}</div>
          <span>${e.emoji}</span>
          <span style="color:rgba(255,255,255,0.5)">???</span>
        </div>`;
      });
      errHtml += `</div><button class="found-all-btn" onclick="foundAll()">✅ Achei todos os 5!</button>`;
      addMsg("fairy", errHtml);
      setPhaseBadge("🔍 Fase 1 — Procurando Erros");

    } catch (e) {
      loader.remove();
      addMsg("fairy", `<span class="api-error">⚠️ Ops! ${e.message}</span>`);
    }
  }

  function markError(id) {
    const el = document.getElementById("err-" + id);
    if (!el || el.classList.contains("found")) return;
    el.classList.add("found");
    const err = errorsData.find(e => e.id === id);
    el.innerHTML = `<div class="error-num" style="background:rgba(255,215,0,0.3);">✓</div><span>${err.emoji}</span><span>${err.name} — ${err.desc}</span>`;
    foundCount++;
    coins++;
    updateCoins();
    if (foundCount === errorsData.length) setTimeout(foundAll, 500);
  }

  async function foundAll() {
    if (phase !== 1) return;
    phase = 2;
    const plimDiv = document.createElement("div");
    plimDiv.className = "msg"; plimDiv.style.justifyContent = "center";
    plimDiv.innerHTML = `<div class="plim">PLIM! ✨ +${errorsData.length} moedas!</div>`;
    document.getElementById("chat").appendChild(plimDiv);
    coins = Math.max(coins, errorsData.length);
    choc = Math.floor(coins / 3) + 1;
    marsh = Math.floor(coins / 4) + 1;
    gumCount = Math.floor(coins / 2) + 1;
    updateCoins();
    plimDiv.scrollIntoView({ behavior: "smooth" });

    const loader = addLoading();
    try {
      const riddle = await callClaude(
        SYSTEM_FAIRY,
        "Diga uma charada SIMPLES sobre um objeto doméstico comum (ex: geladeira, cadeira, torneira, espelho, travesseiro). A charada deve ter no máximo 3 linhas e ser fácil para uma criança de 5-8 anos. Comece com '🧚 PLIM! ✨ Parabéns Chefe!' e depois diga a charada. Guarde o nome do objeto para si mas inclua ao final numa linha começando com OBJETO: (em maiúsculas)"
      );
      loader.remove();
      const lines = riddle.split("\n");
      const objLine = lines.find(l => l.startsWith("OBJETO:"));
      riddleAnswer = objLine ? objLine.replace("OBJETO:", "").trim().toLowerCase() : "";
      const visibleRiddle = lines.filter(l => !l.startsWith("OBJETO:")).join("\n");
      addMsg("fairy", `<div class="riddle-box">${visibleRiddle.replace(/\n/g, "<br>")}</div><div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,0.4);">📸 O Engenheiro tira foto do objeto!</div>`);
      setPhaseBadge("🎯 Fase 3 — A Charada");
      phase = 3;
    } catch (e) {
      loader.remove();
      addMsg("fairy", `<span class="api-error">⚠️ ${e.message}</span>`);
    }
  }

  async function phase4_treasure(b64) {
    phase = 4;
    setPhaseBadge("🎁 Fase 4 — O Tesouro!");
    const loader = addLoading();
    try {
      const resp = await callClaude(
        SYSTEM_FAIRY,
        "Diga uma mensagem super animada e mágica comemorando que o Engenheiro encontrou o objeto da charada! Diga que o Baú de Cristal Arco-Íris está abrindo e soltando doces para a Chefe! Use emojis lindos! Máximo 3 frases.",
        b64
      );
      loader.remove();

      const div = document.createElement("div");
      div.className = "msg";
      div.innerHTML = `
        <div class="avatar fairy">🧚</div>
        <div class="bubble fairy-bubble" style="width:100%;max-width:100%;padding:8px;">
          <div style="font-size:13px;margin-bottom:8px;color:#ffd700;">🏆 TESOURO ENCONTRADO!</div>
          <div class="image-preview" style="border-color:rgba(255,215,0,0.5);">
            <img src="data:image/jpeg;base64,${b64}" alt="objeto">
            <div class="candy-rain" id="treasure-candies"></div>
          </div>
        </div>`;
      document.getElementById("chat").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });

      setTimeout(() => {
        const zone = document.getElementById("treasure-candies");
        if (!zone) return;
        const candies = ["🍫","☁️","🍬","🌟","✨","🎉","🍭","🎊","💛","🌈"];
        for (let i = 0; i < 30; i++) {
          const c = document.createElement("div");
          c.className = "candy";
          c.textContent = candies[Math.floor(Math.random() * candies.length)];
          c.style.cssText = `left:${Math.random()*95}%;animation-delay:${Math.random()*1.5}s;animation-duration:${1.2+Math.random()*1}s;font-size:${16+Math.random()*14}px`;
          zone.appendChild(c);
        }
      }, 300);

      choc += 2; marsh += 2; gumCount += 3; coins += 5;
      updateCoins();

      setTimeout(() => {
        addMsg("fairy", resp.replace(/\n/g, "<br>") +
          `<br><br><div style="font-size:24px;letter-spacing:4px">🏅🍫☁️🍬🌟</div><br>
           <button class="found-all-btn" style="background:linear-gradient(135deg,#a855f7,#6366f1);color:#fff;" onclick="newGame()">🌟 Jogar de Novo!</button>`);
        setPhaseBadge("🎉 Fim do Jogo!");
      }, 1500);

    } catch (e) {
      loader.remove();
      addMsg("fairy", `<span class="api-error">⚠️ ${e.message}</span>`);
    }
  }

  function newGame() {
    phase = 1; errorsData = null; foundCount = 0;
    riddleAnswer = ""; currentPhotoBase64 = null; chatHistory = [];
    coins = 0; choc = 0; marsh = 0; gumCount = 0; updateCoins();
    document.getElementById("chat").innerHTML = "";
    setPhaseBadge("🌟 Fase 1 — A Busca");
    addMsg("fairy", "Oba! Novo jogo! ✨🏰<br>Chefe, peça para o Engenheiro tirar uma foto de um cômodo da casa para começar a aventura! 📸");
  }

  async function handleText(txt) {
    if (!txt.trim()) return;
    addMsg("user", txt);
    if (phase === 1 && !errorsData) {
      addMsg("fairy", "✨ Para começar a magia, o Engenheiro precisa enviar uma foto de um cômodo! Clique no 📷 abaixo!");
      return;
    }
    const loader = addLoading();
    try {
      const r = await callClaude(SYSTEM_FAIRY, txt);
      loader.remove();
      addMsg("fairy", r.replace(/\n/g, "<br>"));
    } catch (e) {
      loader.remove();
      addMsg("fairy", `<span class="api-error">⚠️ ${e.message}</span>`);
    }
  }

  document.getElementById("btn-photo").addEventListener("click", () => {
    document.getElementById("file-in").click();
  });

  document.getElementById("file-in").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const b64 = ev.target.result.split(",")[1];
      currentPhotoBase64 = b64;
      addMsg("user", `<img src="data:image/jpeg;base64,${b64}" style="max-width:200px;border-radius:10px;">`);
      if (phase === 1) await phase1_processPhoto(b64);
      else if (phase === 3) await phase4_treasure(b64);
      else {
        const loader = addLoading();
        try {
          const r = await callClaude(SYSTEM_FAIRY, "O usuário enviou esta foto. Comente de forma mágica e encantadora!", b64);
          loader.remove();
          addMsg("fairy", r.replace(/\n/g, "<br>"));
        } catch (er) { loader.remove(); }
      }
    };
    reader.readAsDataURL(file);
  });

  document.getElementById("btn-send").addEventListener("click", () => {
    const t = document.getElementById("text-in");
    handleText(t.value); t.value = ""; t.style.height = "auto";
  });

  document.getElementById("text-in").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); document.getElementById("btn-send").click(); }
  });

  document.getElementById("text-in").addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 90) + "px";
  });

  // Mensagem inicial
  addMsg("fairy", "Olá, Chefe! ✨🧚 Eu sou a Fadinha de Luz!<br><br>Estou tão feliz de estar aqui com você e com o Engenheiro para uma aventura mágica! 🏰🌟<br><br>Para começar, peça para o <strong>Engenheiro</strong> tirar uma <strong>foto de um cômodo</strong> da casa e enviar aqui! 📸<br><br>O Baú de Cristal Arco-Íris está esperando! 🌈💎");
</script>
</body>
</html>
